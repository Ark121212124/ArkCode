<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Магазин | ArkadyCode</title>

  <link rel="stylesheet" href="css/style.css" />

  <script src="js/products.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/cart.js" defer></script>
</head>
<body>

  <div class="video-bg">
    <video class="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="./video/bg.mp4" type="video/mp4" />
      Ваш браузер не поддерживает видео.
    </video>
  </div>

  <header>
    <div class="logo">ArkadyCode</div>

    <nav>
      <a href="index.html">Главная</a>
      <a href="articles.html">Статьи</a>
      <a class="js-shop-link" href="shop.html">Магазин</a>
      <a href="portfolio.html">Портфолио</a>
      <a href="contact.html">Контакты</a>
      <a id="profileLink" class="js-profile-link" href="login.html?redirect=profile.html">Профиль</a>
      <a class="cart-icon" href="javascript:void(0)" onclick="openCart()">
      <a class="cart-link" href="https://arkcode.onrender.com/cart.html">
  🛒 <span id="cart-count">0</span>
</a>
    </nav>
  </header>

  <section class="container reveal shop-page" id="catalog">
    <div class="shop-hero">
      <span class="shop-badge">ArkadyCode Store</span>
      <h1>Каталог товаров</h1>
      <p>Подбери комплектующие по категориям, цене и рейтингу</p>
    </div>

    <div class="shop-panel">
      <div class="shop-toolbar">
        <input
          type="text"
          id="search"
          placeholder="Поиск товаров..."
          class="search shop-search"
        />

        <select id="sortSelect" class="shop-sort">
          <option value="default">Сортировка</option>
          <option value="priceLow">Сначала дешевле</option>
          <option value="priceHigh">Сначала дороже</option>
          <option value="rating">По рейтингу</option>
          <option value="name">По названию</option>
        </select>
      </div>

      <div class="categories" id="category-buttons"></div>
    </div>

    <div id="product-list"></div>
  </section>

  <footer>
    ArkadyCode © 2026
  </footer>

  <script>
    function reveal() {
      const reveals = document.querySelectorAll(".reveal");

      reveals.forEach(element => {
        const windowHeight = window.innerHeight;
        const elementTop = element.getBoundingClientRect().top;

        if (elementTop < windowHeight - 120) {
          element.classList.add("active");
        }
      });
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(value) {
      const amount = Number(value) || 0;
      return `${amount.toLocaleString("ru-RU")} ₽`;
    }

    function getProductImage(product) {
      if (Array.isArray(product.images) && product.images.length) {
        return product.images[0];
      }

      if (product.image) {
        return product.image;
      }

      return "images/no-image.png";
    }

    function getCategoryLabel(category) {
      const labels = window.categoryLabels || {
        cpu: "Процессоры",
        gpu: "Видеокарты",
        memory: "Оперативная память",
        motherboard: "Материнские платы",
        storage: "Накопители",
        cooler: "Охлаждение",
        psu: "Блоки питания",
        case: "Корпуса"
      };

      return labels[category] || category || "Товары";
    }

    function getCategoryOrder() {
      if (Array.isArray(window.categoryOrder) && window.categoryOrder.length) {
        return window.categoryOrder;
      }

      return [
        "cpu",
        "gpu",
        "memory",
        "motherboard",
        "storage",
        "cooler",
        "psu",
        "case"
      ];
    }

    function normalizeProducts(items) {
      if (!Array.isArray(items)) return [];

      return items
        .filter(Boolean)
        .map(product => ({
          ...product,
          id: Number(product.id),
          name: String(product.name || "").trim(),
          category: String(product.category || "").trim().toLowerCase(),
          brand: String(product.brand || "").trim(),
          price: Number(product.price) || 0,
          rating: Number(product.rating) || 0,
          stock: Number(product.stock) || 0,
          description: String(product.description || "").trim(),
          image: product.image || "",
          images: Array.isArray(product.images) ? product.images : [],
          specs: Array.isArray(product.specs) ? product.specs : []
        }))
        .filter(product => product.id && product.name);
    }

    function getProductsSource() {
      const fromWindowProducts = normalizeProducts(window.products);
      if (fromWindowProducts.length) return fromWindowProducts;

      const fromWindowDefaults = normalizeProducts(window.defaultProducts);
      if (fromWindowDefaults.length) return fromWindowDefaults;

      try {
        const fromLocalStorage = normalizeProducts(
          JSON.parse(localStorage.getItem("products") || "[]")
        );
        if (fromLocalStorage.length) return fromLocalStorage;
      } catch (error) {
        console.warn("Ошибка чтения localStorage products:", error);
      }

      return [];
    }

    let allProducts = getProductsSource();

    if (!allProducts.length && Array.isArray(window.defaultProducts)) {
      allProducts = normalizeProducts(window.defaultProducts);
    }

    if (allProducts.length) {
      localStorage.setItem("products", JSON.stringify(allProducts));
    }

    function addToCartById(id) {
      const product = allProducts.find(item => String(item.id) === String(id));

      if (product && typeof addToCart === "function") {
        addToCart(product);
      }
    }

    const storeState = {
      selectedCategory: "all",
      search: "",
      sort: "default"
    };

    function getCategoryOrderValue(category) {
      const order = getCategoryOrder();
      const index = order.indexOf(category);
      return index === -1 ? 999 : index;
    }

    function sortList(list, sortType = "default") {
      const sorted = [...list];

      if (sortType === "priceLow") {
        sorted.sort((a, b) => (Number(a.price) || 0) - (Number(b.price) || 0));
        return sorted;
      }

      if (sortType === "priceHigh") {
        sorted.sort((a, b) => (Number(b.price) || 0) - (Number(a.price) || 0));
        return sorted;
      }

      if (sortType === "rating") {
        sorted.sort((a, b) => {
          const ratingDiff = (Number(b.rating) || 0) - (Number(a.rating) || 0);
          if (ratingDiff !== 0) return ratingDiff;
          return (Number(a.price) || 0) - (Number(b.price) || 0);
        });
        return sorted;
      }

      if (sortType === "name") {
        sorted.sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "ru"));
        return sorted;
      }

      sorted.sort((a, b) => {
        const categoryDiff = getCategoryOrderValue(a.category) - getCategoryOrderValue(b.category);
        if (categoryDiff !== 0) return categoryDiff;

        return String(a.name || "").localeCompare(String(b.name || ""), "ru");
      });

      return sorted;
    }

    function filterProducts() {
      let filtered = [...allProducts];

      if (storeState.selectedCategory !== "all") {
        filtered = filtered.filter(product => product.category === storeState.selectedCategory);
      }

      if (storeState.search.trim()) {
        const query = storeState.search.trim().toLowerCase();

        filtered = filtered.filter(product => {
          const name = String(product.name || "").toLowerCase();
          const brand = String(product.brand || "").toLowerCase();
          const category = String(getCategoryLabel(product.category) || "").toLowerCase();
          const description = String(product.description || "").toLowerCase();

          return (
            name.includes(query) ||
            brand.includes(query) ||
            category.includes(query) ||
            description.includes(query)
          );
        });
      }

      return sortList(filtered, storeState.sort);
    }

    function renderProductCard(product) {
      const img = getProductImage(product);
      const ratingValue = Math.round(Number(product.rating) || 0);
      const categoryName = getCategoryLabel(product.category);
      const stockText = (Number(product.stock) || 0) > 0 ? "В наличии" : "Нет в наличии";

      return `
        <div class="product" data-category="${escapeHtml(product.category)}">
          <a href="product.html?id=${product.id}" class="product-link">
            <div class="product-image-wrap">
              <img src="${escapeHtml(img)}" alt="${escapeHtml(product.name)}">
            </div>

            <div class="product-category">${escapeHtml(categoryName)}</div>
            <h3>${escapeHtml(product.name)}</h3>
          </a>

          <div class="product-meta">
            <div class="rating">${ratingValue ? "★".repeat(ratingValue) : "Без рейтинга"}</div>
            <div class="product-stock">${escapeHtml(stockText)}</div>
          </div>

          <p class="price">${formatPrice(product.price)}</p>

          <button type="button" onclick="addToCartById('${product.id}')">
            В корзину
          </button>
        </div>
      `;
    }

    function renderGroupedProducts(list) {
      const container = document.getElementById("product-list");
      if (!container) return;

      if (!list.length) {
        container.innerHTML = `
          <div class="product-empty">
            <h3>Ничего не найдено</h3>
            <p>Попробуй изменить поиск или выбрать другую категорию.</p>
          </div>
        `;
        return;
      }

      const grouped = {};

      list.forEach(product => {
        if (!grouped[product.category]) {
          grouped[product.category] = [];
        }
        grouped[product.category].push(product);
      });

      const categories = getCategoryOrder().filter(category => grouped[category]?.length);

      const otherCategories = Object.keys(grouped).filter(
        category => !categories.includes(category)
      );

      const finalCategories = [...categories, ...otherCategories];

      container.innerHTML = finalCategories.map(category => {
        const items = grouped[category] || [];

        return `
          <div class="catalog-category-block">
            <div class="catalog-category-header">
              <div>
                <div class="catalog-category-subtitle">Категория</div>
                <h3 class="catalog-category-title">${escapeHtml(getCategoryLabel(category))}</h3>
              </div>
              <span class="catalog-category-count">${items.length} шт.</span>
            </div>

            <div class="products">
              ${items.map(renderProductCard).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderFlatProducts(list) {
      const container = document.getElementById("product-list");
      if (!container) return;

      if (!list.length) {
        container.innerHTML = `
          <div class="product-empty">
            <h3>Ничего не найдено</h3>
            <p>Попробуй изменить поиск или выбрать другую категорию.</p>
          </div>
        `;
        return;
      }

      const categoryLabel = getCategoryLabel(storeState.selectedCategory);

      container.innerHTML = `
        <div class="catalog-category-block">
          <div class="catalog-category-header">
            <div>
              <div class="catalog-category-subtitle">Категория</div>
              <h3 class="catalog-category-title">${escapeHtml(categoryLabel)}</h3>
            </div>
            <span class="catalog-category-count">${list.length} шт.</span>
          </div>

          <div class="products">
            ${list.map(renderProductCard).join("")}
          </div>
        </div>
      `;
    }

    function renderProducts() {
      const filtered = filterProducts();

      if (storeState.selectedCategory === "all") {
        renderGroupedProducts(filtered);
      } else {
        renderFlatProducts(filtered);
      }
    }

    function renderCategoryButtons() {
      const container = document.getElementById("category-buttons");
      if (!container) return;

      const categories = getCategoryOrder();

      container.innerHTML = `
        <button
          type="button"
          class="category-btn ${storeState.selectedCategory === "all" ? "active" : ""}"
          onclick="filterCategory('all')"
        >
          Все
        </button>

        ${categories.map(category => `
          <button
            type="button"
            class="category-btn ${storeState.selectedCategory === category ? "active" : ""}"
            onclick="filterCategory('${category}')"
          >
            ${escapeHtml(getCategoryLabel(category))}
          </button>
        `).join("")}
      `;
    }

    function searchProducts() {
      const input = document.getElementById("search");
      storeState.search = input ? input.value : "";
      renderProducts();
    }

    function filterCategory(category) {
      storeState.selectedCategory = category;
      renderCategoryButtons();
      renderProducts();
    }

    function changeSort(value) {
      storeState.sort = value || "default";
      renderProducts();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const searchInput = document.getElementById("search");
      const sortSelect = document.getElementById("sortSelect");

      if (searchInput) {
        searchInput.addEventListener("input", searchProducts);
      }

      if (sortSelect) {
        sortSelect.addEventListener("change", e => {
          changeSort(e.target.value);
        });
      }

      renderCategoryButtons();
      renderProducts();
      reveal();

      if (window.location.search.includes("openCart=1") && typeof openCart === "function") {
        openCart();
      }

      if (typeof updateCartCount === "function") {
        updateCartCount();
      }

      console.log("Товары магазина:", allProducts);
    });

    window.addEventListener("scroll", reveal);
  </script>
</body>
</html>
