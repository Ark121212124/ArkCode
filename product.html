<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Товар | ArkadyCode</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="js/products.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/cart.js" defer></script>
</head>
<body>

  <!-- VIDEO BACKGROUND -->
  <div class="video-bg">
    <video class="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="./video/bg.mp4" type="video/mp4">
      Ваш браузер не поддерживает видео.
    </video>
  </div>

  <header>
    <div class="logo">ArkadyCode</div>

    <nav>
      <a href="index.html">Главная</a>
      <a href="articles.html">Статьи</a>
      <a class="js-shop-link" href="shop.html">Магазин</a>
      <a href="portfolio.html">Портфолио</a>
      <a href="contact.html">Контакты</a>
      <a id="profileLink" class="js-profile-link" href="login.html?redirect=profile.html">Вход</a>

      <a class="cart-icon" href="javascript:void(0)" onclick="openCart()">
        🛒 <span id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <section class="container product-container">
    <div class="product-shell" id="productShell">

      <div class="breadcrumbs">
        <a class="js-shop-link" href="shop.html">Магазин</a>
        <span>•</span>
        <span id="crumbCategory">Категория</span>
        <span>•</span>
        <span id="crumbTitle">Карточка товара</span>
      </div>

      <div class="product-layout">
        <!-- ЛЕВАЯ ЧАСТЬ -->
        <div class="product-gallery-card">
          <div class="main-img-wrap">
            <img id="main-img" class="main-img" alt="Фото товара">
          </div>

          <div class="thumbs" id="thumbs"></div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ -->
        <div class="product-side-card">
          <div class="product-topline">
            <div class="badge-group" id="badgeRow"></div>
            <div class="product-code" id="productCode"></div>
          </div>

          <h1 id="title" class="product-title"></h1>

          <div class="rating-row">
            <div id="rating" class="rating"></div>
            <span id="ratingText" class="rating-caption"></span>
          </div>

          <p id="description" class="product-summary"></p>

          <div class="purchase-box">
            <div class="purchase-price">
              <span class="price-label">Цена</span>
              <p class="price current-price" id="price"></p>
              <span class="price-subtitle">Актуальная цена на сайте</span>
            </div>

            <button id="buyBtn" class="btn buy-main-btn" type="button">
              Добавить в корзину
            </button>
          </div>

          <div class="product-benefits">
            <div class="benefit-card">
              <span class="benefit-icon">⚡</span>
              <p>Быстрое оформление</p>
            </div>

            <div class="benefit-card">
              <span class="benefit-icon">🛡️</span>
              <p>Проверенное качество</p>
            </div>

            <div class="benefit-card">
              <span class="benefit-icon">🚚</span>
              <p>Удобная доставка</p>
            </div>
          </div>

          <h3 class="section-title">Характеристики</h3>
          <div id="specsGrid" class="specs-grid"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ОТЗЫВЫ -->
  <section class="container">
    <div class="product-section-box">
      <h2 class="section-heading">Отзывы покупателей</h2>

      <ul id="reviewsList" class="reviews-list"></ul>

      <div class="review-form">
        <input id="reviewInput" placeholder="Поделитесь впечатлением о товаре...">
        <button onclick="addReview()" class="btn" type="button">
          Добавить отзыв
        </button>
      </div>
    </div>
  </section>

  <!-- РЕКОМЕНДУЕМ -->
  <section class="container">
    <div class="product-section-box related-section">
      <h2 class="section-heading">Рекомендуемые товары</h2>
      <div class="products products-related" id="related"></div>
    </div>
  </section>

  <footer>
    ArkadyCode © 2026
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));
    const product = Array.isArray(products) ? products.find(p => Number(p.id) === id) : null;

    const currencySymbol = "₽";

    const categoryLabels = {
      cpu: "Процессоры",
      gpu: "Видеокарты",
      memory: "Оперативная память",
      motherboard: "Материнские платы",
      storage: "Накопители",
      cooler: "Охлаждение",
      psu: "Блоки питания",
      case: "Корпуса"
    };

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(value) {
      const num = Number(value) || 0;
      return `${num.toLocaleString("ru-RU")} ${currencySymbol}`;
    }

    function getCategoryLabel(category) {
      return categoryLabels[category] || "Товары";
    }

    function parseSpec(spec, index) {
      if (typeof spec === "string" && spec.includes(":")) {
        const parts = spec.split(":");
        const label = parts.shift().trim();
        const value = parts.join(":").trim();

        return {
          label: label || `Параметр ${index + 1}`,
          value: value || "—"
        };
      }

      return {
        label: `Параметр ${index + 1}`,
        value: String(spec || "—")
      };
    }

    function renderStars(value) {
      const rounded = Math.round(Number(value) || 0);
      let html = "";

      for (let i = 1; i <= 5; i++) {
        html += `<span class="star ${i <= rounded ? "filled" : ""}">★</span>`;
      }

      return html;
    }

    function getProductImages(item) {
      if (Array.isArray(item.images) && item.images.length) {
        return item.images;
      }

      if (item.image) {
        return [item.image];
      }

      return ["images/no-image.png"];
    }

    function setMainImage(src, clickedThumb = null) {
      const mainImg = document.getElementById("main-img");
      if (!mainImg) return;

      mainImg.src = src;
      mainImg.alt = product?.name || "Фото товара";

      document.querySelectorAll(".thumb").forEach(thumb => {
        thumb.classList.remove("active");
      });

      if (clickedThumb) {
        clickedThumb.classList.add("active");
      }
    }

    function getStockLabel(stock) {
      const value = Number(stock) || 0;

      if (value <= 0) return "Нет в наличии";
      if (value <= 5) return "Осталось мало";
      return "В наличии";
    }

    function getRelatedProducts(currentProduct, allProducts, limit = 4) {
      if (!currentProduct || !Array.isArray(allProducts)) return [];

      const sameCategory = allProducts
        .filter(p => p.id !== currentProduct.id && p.category === currentProduct.category)
        .sort((a, b) => {
          const ratingDiff = (Number(b.rating) || 0) - (Number(a.rating) || 0);
          if (ratingDiff !== 0) return ratingDiff;

          const stockDiff = (Number(b.stock) || 0) - (Number(a.stock) || 0);
          if (stockDiff !== 0) return stockDiff;

          return (Number(a.price) || 0) - (Number(b.price) || 0);
        });

      const otherProducts = allProducts
        .filter(p => p.id !== currentProduct.id && p.category !== currentProduct.category)
        .sort((a, b) => {
          const ratingDiff = (Number(b.rating) || 0) - (Number(a.rating) || 0);
          if (ratingDiff !== 0) return ratingDiff;

          return (Number(a.price) || 0) - (Number(b.price) || 0);
        });

      return [...sameCategory, ...otherProducts].slice(0, limit);
    }

    function getReviewsKey(productId) {
      return `reviews_${productId}`;
    }

    function loadReviews(productId) {
      try {
        return JSON.parse(localStorage.getItem(getReviewsKey(productId))) || [];
      } catch {
        return [];
      }
    }

    function saveReviews(productId, reviews) {
      localStorage.setItem(getReviewsKey(productId), JSON.stringify(reviews));
    }

    function displayReviews() {
      if (!product) return;

      const reviewsList = document.getElementById("reviewsList");
      if (!reviewsList) return;

      const reviews = loadReviews(product.id);

      if (!reviews.length) {
        reviewsList.innerHTML = `
          <li class="review-empty">
            Пока нет отзывов. Будьте первым, кто оставит отзыв.
          </li>
        `;
        return;
      }

      reviewsList.innerHTML = reviews.map(review => `
        <li class="review-item">
          <div class="review-text">${escapeHtml(review)}</div>
        </li>
      `).join("");
    }

    function addReview() {
      if (!product) return;

      const input = document.getElementById("reviewInput");
      if (!input) return;

      const text = input.value.trim();
      if (!text) return;

      const reviews = loadReviews(product.id);
      reviews.unshift(text);

      saveReviews(product.id, reviews);
      input.value = "";
      displayReviews();
    }

    if (!product) {
      document.getElementById("productShell").innerHTML = `
        <div class="product-empty">
          <h2>Товар не найден</h2>
          <p>Похоже, такой карточки больше нет или ссылка неверная.</p>
          <a href="shop.html" class="btn">Вернуться в магазин</a>
        </div>
      `;
    } else {
      const categoryLabel = getCategoryLabel(product.category);
      const ratingValue = Number(product.rating) || 0;
      const stockLabel = getStockLabel(product.stock);
      const images = getProductImages(product);
      const specs = Array.isArray(product.specs) ? product.specs : [];

      document.title = `${product.name} | ArkadyCode`;
      document.getElementById("crumbCategory").textContent = categoryLabel;
      document.getElementById("crumbTitle").textContent = product.name;
      document.getElementById("title").textContent = product.name;
      document.getElementById("description").textContent = product.description || "Описание скоро появится.";
      document.getElementById("price").textContent = formatPrice(product.price);
      document.getElementById("productCode").textContent = `Артикул #${String(product.id).padStart(4, "0")}`;

      document.getElementById("rating").innerHTML = renderStars(ratingValue);
      document.getElementById("ratingText").textContent = `${ratingValue.toFixed(1)} / 5`;

      const badgeRow = document.getElementById("badgeRow");
      badgeRow.innerHTML = `
        <span class="product-badge badge-category">${escapeHtml(categoryLabel)}</span>
        <span class="product-badge badge-hot">${ratingValue >= 4.5 ? "Хит продаж" : "Популярный товар"}</span>
        <span class="product-badge badge-stock">${escapeHtml(stockLabel)}</span>
      `;

      setMainImage(images[0]);

      const thumbs = document.getElementById("thumbs");
      thumbs.innerHTML = images.map((img, index) => `
        <button
          class="thumb ${index === 0 ? "active" : ""}"
          type="button"
          data-img="${escapeHtml(img)}"
          aria-label="Фото ${index + 1}"
        >
          <img src="${escapeHtml(img)}" alt="${escapeHtml(product.name)} ${index + 1}">
        </button>
      `).join("");

      document.querySelectorAll(".thumb").forEach(thumb => {
        thumb.addEventListener("click", () => {
          setMainImage(thumb.dataset.img, thumb);
        });
      });

      const specsGrid = document.getElementById("specsGrid");
      if (!specs.length) {
        specsGrid.innerHTML = `
          <div class="spec-card">
            <span class="spec-label">Характеристики</span>
            <span class="spec-value">Пока не заполнены</span>
          </div>
        `;
      } else {
        specsGrid.innerHTML = specs.map((item, index) => {
          const spec = parseSpec(item, index);

          return `
            <div class="spec-card">
              <span class="spec-label">${escapeHtml(spec.label)}</span>
              <span class="spec-value">${escapeHtml(spec.value)}</span>
            </div>
          `;
        }).join("");
      }

      document.getElementById("buyBtn").onclick = () => {
        addToCart(product);
      };

      const related = document.getElementById("related");
      const relatedProducts = getRelatedProducts(product, products, 4);

      if (!relatedProducts.length) {
        related.innerHTML = `
          <div class="product-empty-related">
            Пока нет рекомендованных товаров.
          </div>
        `;
      } else {
        related.innerHTML = relatedProducts.map(p => {
          const img = getProductImages(p)[0];
          const category = getCategoryLabel(p.category);

          return `
            <div class="product">
              <a href="product.html?id=${p.id}">
                <img src="${escapeHtml(img)}" alt="${escapeHtml(p.name)}">
                <div class="product-category">${escapeHtml(category)}</div>
                <h3>${escapeHtml(p.name)}</h3>
              </a>
              <p class="price">${formatPrice(p.price)}</p>
              <button
                type="button"
                class="related-buy-btn"
                data-id="${p.id}"
              >
                В корзину
              </button>
            </div>
          `;
        }).join("");

        document.querySelectorAll(".related-buy-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const relatedId = Number(btn.dataset.id);
            const relatedProduct = products.find(p => Number(p.id) === relatedId);

            if (relatedProduct) {
              addToCart(relatedProduct);
            }
          });
        });
      }

      displayReviews();
    }
  </script>
</body>
</html>
