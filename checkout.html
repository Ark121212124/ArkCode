<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Оплата | ArkadyCode</title>

<link rel="stylesheet" href="css/style.css">

<script src="js/cart.js" defer></script>

</head>

<body>

<header>
<h1>Оформление заказа</h1>
</header>

<div class="container checkout">

<h2>Данные покупателя</h2>

<form onsubmit="pay(event)">

<input type="text" placeholder="Имя и фамилия" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Адрес доставки" required>

<h2>Оплата</h2>

<input type="text" placeholder="Номер карты" maxlength="16" required>

<div class="card-row">

<input type="text" placeholder="MM/YY" required>

<input type="text" placeholder="CVC" required>

</div>

<button class="pay-btn">
Оплатить заказ
</button>

</form>

</div>

</body>
</html>
